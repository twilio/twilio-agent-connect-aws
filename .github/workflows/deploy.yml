name: Deploy

on:
  release:
    types: [published]

env:
  ARTIFACTORY_URL: ${{ vars.ARTIFACTORY_URL }}

jobs:
  test:
    name: Test - Python ${{ matrix.python-version }}
    runs-on: ${{ github.repository_owner == 'twilio' && 'ubuntu-x64' || 'ubuntu-latest' }}
    if: github.repository_owner == 'twilio'
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Authenticate with Artifactory
        uses: ./.github/actions/artifactory-oidc
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5
        with:
          version: "0.9.26"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --frozen --all-extras --all-packages
      - run: uv run ruff check src/tac_aws getting_started
      - run: uv run ruff format --check src/tac_aws getting_started
      - run: MYPYPATH=src uv run mypy src/tac_aws getting_started
      - run: uv run pytest

  deploy:
    name: Publish to PyPI
    needs: [test]
    runs-on: ${{ github.repository_owner == 'twilio' && 'ubuntu-x64' || 'ubuntu-latest' }}
    if: github.repository_owner == 'twilio'
    environment: pypi
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Authenticate with Artifactory
        uses: ./.github/actions/artifactory-oidc
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5
        with:
          version: "0.9.26"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Validate tag format and version match
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Release tag must be in the form v1.2.3 (got '$TAG')"
            exit 1
          fi
          VERSION="${TAG#v}"
          PKG_VERSION=$(python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
