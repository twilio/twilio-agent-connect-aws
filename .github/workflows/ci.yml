name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5
        with:
          version: "0.9.26"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"

      - name: Set package quarantine date
        run: echo "QUARANTINE_DATE=$(date -u -d '2 days ago' +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          uv venv
          . .venv/bin/activate
          uv sync --all-extras --all-groups --exclude-newer "$QUARANTINE_DATE"

      - name: Run ruff check
        run: |
          . .venv/bin/activate
          echo "Checking Python files in repository:"
          find . -name "*.py" -not -path "./.venv/*" -not -path "./.*" -type f | sort | head -30
          echo ""
          echo "Total Python files to check:"
          find . -name "*.py" -not -path "./.venv/*" -not -path "./.*" -type f | wc -l
          echo ""
          uv run ruff check .

      - name: Run ruff format check
        run: |
          . .venv/bin/activate
          echo "Checking formatting for Python files in repository:"
          find . -name "*.py" -not -path "./.venv/*" -not -path "./.*" -type f | wc -l
          echo "files"
          echo ""
          uv run ruff format --check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5
        with:
          version: "0.9.26"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"

      - name: Set package quarantine date
        run: echo "QUARANTINE_DATE=$(date -u -d '2 days ago' +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          uv venv
          . .venv/bin/activate
          uv sync --all-extras --all-groups --exclude-newer "$QUARANTINE_DATE"

      - name: Run mypy
        run: |
          . .venv/bin/activate
          echo "Type checking directories: src/tac_aws getting_started"
          echo ""
          echo "Python files in src/tac_aws:"
          find src/tac_aws -name "*.py" -type f | wc -l
          echo ""
          echo "Python files in getting_started:"
          find getting_started -name "*.py" -type f | wc -l
          echo ""
          MYPYPATH=src uv run mypy src/tac_aws getting_started

  test:
    name: Test - Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5
        with:
          version: "0.9.26"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set package quarantine date
        run: echo "QUARANTINE_DATE=$(date -u -d '2 days ago' +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          uv venv
          . .venv/bin/activate
          uv sync --all-extras --all-groups --exclude-newer "$QUARANTINE_DATE"

      - name: Run tests with coverage
        run: |
          . .venv/bin/activate
          uv run pytest --cov=src/tac_aws --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.10'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  build:
    name: Build Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5
        with:
          version: "0.9.26"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"

      - name: Build package
        run: |
          uv build

      - name: Check package metadata
        run: |
          uv venv
          . .venv/bin/activate
          pip install twine
          twine check dist/*

      - name: Test package installation
        run: |
          python -m venv test-env
          . test-env/bin/activate
          pip install dist/*.whl
          python -c "import tac_aws; print(f'Successfully imported tac_aws')"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  all-checks:
    name: All Checks Passed
    needs: [lint, type-check, test, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all job statuses
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs['type-check'].result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "One or more checks failed"
            exit 1
          fi
