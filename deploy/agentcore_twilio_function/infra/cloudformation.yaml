AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM User for Twilio Functions to access AWS Bedrock AgentCore'

Parameters:
  UserName:
    Type: String
    Default: 'tac-agentcore-twilio-function'
    Description: IAM user name for Twilio Functions integration

Resources:
  # IAM User
  TwilioAgentCoreUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Ref UserName
      Tags:
        - Key: Purpose
          Value: TwilioFunctionsAgentCoreIntegration
        - Key: ManagedBy
          Value: CloudFormation

  # Full Policy for AgentCore Access
  AgentCoreAccessPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: TwilioAgentCoreMinimalAccess
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: BedrockAgentCoreFullAccess
            Effect: Allow
            Action:
              - bedrock-agentcore:*
            Resource:
              - !Sub 'arn:aws:bedrock-agentcore:*:${AWS::AccountId}:runtime/*'
      Users:
        - !Ref TwilioAgentCoreUser

  # Access Key for the user
  TwilioAgentCoreAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref TwilioAgentCoreUser

Outputs:
  UserName:
    Description: IAM User Name
    Value: !Ref TwilioAgentCoreUser
    Export:
      Name: !Sub '${AWS::StackName}-UserName'

  AccessKeyId:
    Description: Access Key ID (use in .env as AWS_ACCESS_KEY_ID)
    Value: !Ref TwilioAgentCoreAccessKey
    Export:
      Name: !Sub '${AWS::StackName}-AccessKeyId'

  SecretAccessKey:
    Description: Secret Access Key (use in .env as AWS_SECRET_ACCESS_KEY) - SAVE THIS NOW!
    Value: !GetAtt TwilioAgentCoreAccessKey.SecretAccessKey
    Export:
      Name: !Sub '${AWS::StackName}-SecretAccessKey'

  PolicyArn:
    Description: IAM Policy ARN
    Value: !Sub 'arn:aws:iam::${AWS::AccountId}:policy/TwilioAgentCoreMinimalAccess'

  Warning:
    Description: Important Security Notice
    Value: 'The Secret Access Key is only visible once in CloudFormation outputs. Copy it immediately to your .env file. If lost, delete and recreate the stack.'
