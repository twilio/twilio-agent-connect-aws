AWSTemplateFormatVersion: '2010-09-09'
Description: 'Twilio Webhook Proxy Lambda Function'

Parameters:
  TwilioConversationConfigurationId:
    Type: String
    Description: Twilio Conversation Configuration ID

  AgentCoreRuntimeArn:
    Type: String
    Description: Full AgentCore Runtime ARN

Resources:
  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: tac-proxy-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AgentCoreInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock-agentcore:*
                Resource: !Sub 'arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*'
      Tags:
        - Key: Name
          Value: tac-proxy-lambda-role

  # Lambda Function
  TwilioWebhookProxyFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: tac-proxy
      Runtime: python3.13
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 1024
      Code: function.zip
      Environment:
        Variables:
          AGENTCORE_RUNTIME_ARN: !Ref AgentCoreRuntimeArn
          TWILIO_CONVERSATION_CONFIGURATION_ID: !Ref TwilioConversationConfigurationId
      Tags:
        - Key: Name
          Value: tac-proxy

  # Lambda Function URL
  TwilioWebhookProxyFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt TwilioWebhookProxyFunction.Arn

  # Permission for Function URL
  TwilioWebhookProxyFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TwilioWebhookProxyFunction
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

  # Additional public invoke permission
  TwilioWebhookProxyPublicPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TwilioWebhookProxyFunction
      Action: lambda:InvokeFunction
      Principal: '*'

Outputs:
  LambdaFunctionUrl:
    Description: Lambda Function URL
    Value: !GetAtt TwilioWebhookProxyFunctionUrl.FunctionUrl
    Export:
      Name: tac-proxy-FunctionUrl

  VoiceWebhookUrl:
    Description: Twilio Voice Webhook URL
    Value: !Sub '${TwilioWebhookProxyFunctionUrl.FunctionUrl}twiml'

  SmsWebhookUrl:
    Description: Twilio SMS Webhook URL
    Value: !Sub '${TwilioWebhookProxyFunctionUrl.FunctionUrl}webhook'

  FunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt TwilioWebhookProxyFunction.Arn
