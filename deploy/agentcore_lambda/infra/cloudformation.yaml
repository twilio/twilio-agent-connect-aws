AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3 Infrastructure for TAC AgentCore Lambda Deployment'

Parameters:
  BucketName:
    Type: String
    Description: S3 bucket name for deployment packages

Resources:
  # Single S3 bucket for all deployment packages (AgentCore and Lambda)
  DeploymentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Purpose
          Value: TACAgentCoreLambdaDeployments
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  DeploymentBucketName:
    Description: S3 bucket for all deployment packages (AgentCore and Lambda)
    Value: !Ref DeploymentBucket
    Export:
      Name: !Sub '${AWS::StackName}-DeploymentBucket'

  DeploymentBucketArn:
    Description: ARN of deployment bucket
    Value: !GetAtt DeploymentBucket.Arn
