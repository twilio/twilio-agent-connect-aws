[pytest]
# Pytest configuration for twilio-agent-connect-aws

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode for async tests
asyncio_mode = auto

# Output options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --color=yes
    -ra

# Test paths
testpaths = tests

# Markers
markers =
    asyncio: mark test as async test
    integration: mark test as integration test (deselect with '-m "not integration"')
    slow: mark test as slow running

# Ignore paths
norecursedirs = .git .venv venv build dist *.egg-info

# Coverage options (if using pytest-cov)
[coverage:run]
source = src/tac_aws
omit =
    */tests/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
